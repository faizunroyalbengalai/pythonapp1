{% extends "base.html" %}

{% block title %}Register | AtlasAuth{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <h1>Create your account</h1>
        <p>Use your MongoDB Atlas database to store your users securely.</p>
        <form method="post" class="auth-form">
            <label for="name">Full Name</label>
            <input id="name" name="name" type="text" placeholder="Your name" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="At least 8 characters" required>

            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" placeholder="Re-enter your password" required>

            <button type="submit" class="button button-primary button-block">Register</button>
        </form>
        <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</section>
{% endblock %}
