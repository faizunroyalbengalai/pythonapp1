<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pythonapp</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 640px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 999px;
    }

    .card {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .project-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1f6feb, #58a6ff);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
      box-shadow: 0 4px 20px rgba(88, 166, 255, 0.3);
    }

    .project-name {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #58a6ff, #a5d6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }

    .project-description {
      color: #8b949e;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #30363d;
      margin: 0 0 2rem;
    }

    .repo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background-color: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 0.9rem 1.5rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }

    .repo-section:hover {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
    }

    .repo-icon {
      flex-shrink: 0;
      color: #8b949e;
    }

    .repo-label {
      font-size: 0.78rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
    }

    .repo-name {
      font-size: 1rem;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.01em;
    }

    .repo-divider {
      width: 1px;
      height: 24px;
      background-color: #30363d;
      flex-shrink: 0;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
    }

    .footer-text {
      font-size: 0.85rem;
      color: #8b949e;
      letter-spacing: 0.03em;
    }

    .footer-text span {
      color: #58a6ff;
      font-weight: 600;
    }

    .footer-line {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #1f6feb, #58a6ff);
      border-radius: 999px;
      margin: 0.6rem auto 0.6rem;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }
      .project-name {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="badge">&#x2713; Active Project</div>

    <div class="card">

      <div class="project-icon">
        &#x1F40D;
      </div>

      <h1 class="project-name">pythonapp</h1>

      <p class="project-description">
        A modern Python application built for performance and simplicity.
        Clean code, powerful features, ready to deploy.
      </p>

      <hr class="divider" />

      <div class="repo-section">
        <svg class="repo-icon" width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/>
        </svg>
        <div>
          <div class="repo-label">Repository</div>
          <div class="repo-name">pythonapp1</div>
        </div>
        <div class="repo-divider"></div>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="#8b949e" aria-hidden="true">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
        </svg>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-value">Python</span>
          <span class="stat-label">Language</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">v1.0</span>
          <span class="stat-label">Version</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">MIT</span>
          <span class="stat-label">License</span>
        </div>
      </div>

    </div>

    <footer>
      <div class="footer-line"></div>
      <p class="footer-text">Developed by <span>Royal Bengal AI</span></p>
    </footer>

  </div>

</body>
</html>
